services:
  # ========================================
  # API Service (Docker)
  # ========================================
  - type: web
    name: iran-news-api
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile.api
    dockerContext: ./
    envVars:
      # Database Configuration
      - key: DB_NAME
        value: iran_news_pipeline
      - key: DB_HOST
        value: dpg-d6hl9v7gi27c73ftat10-a.oregon-postgres.render.com
      - key: DB_USER
        value: iran_news_pipeline_user
      - key: DB_PASSWORD
        sync: false
      - key: DB_PORT
        value: 5432
      # AWS Configuration
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
      # Google Cloud Configuration
      - key: GCS_BUCKET_NAME
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false
      # Telegram Configuration
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false
      - key: TELEGRAM_PHONE
        sync: false
      # Python
      - key: PYTHONUNBUFFERED
        value: 1

  # ========================================
  # Worker Service (Docker)
  # ========================================
  - type: background_worker
    name: iran-news-worker
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile.worker
    dockerContext: ./
    envVars:
      # Database Configuration
      - key: DB_NAME
        value: iran_news_pipeline
      - key: DB_HOST
        value: dpg-d6hl9v7gi27c73ftat10-a.oregon-postgres.render.com
      - key: DB_USER
        value: iran_news_pipeline_user
      - key: DB_PASSWORD
        sync: false
      - key: DB_PORT
        value: 5432
      # AWS Configuration
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
      # Google Cloud Configuration
      - key: GCS_BUCKET_NAME
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false
      # Telegram Configuration
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false
      - key: TELEGRAM_PHONE
        sync: false
      # Python
      - key: PYTHONUNBUFFERED
        value: 1
