services:
  - type: web
    name: iran-news-api
    env: python
    plan: free
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port 8000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: PYTHONUNBUFFERED
        value: 1
      - key: DB_NAME
        value: iran_news_pipeline
      - key: DB_HOST
        value: dpg-d6hl9v7gi27c73ftat10-a.oregon-postgres.render.com
      - key: DB_USER
        value: iran_news_pipeline_user
      - key: DB_PASSWORD
        sync: false
      - key: DB_PORT
        value: 5432
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
      - key: GCS_BUCKET_NAME
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false

  - type: background
    name: iran-news-worker-parallel
    env: python
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: PYTHONUNBUFFERED
        value: 1
      - key: DB_NAME
        value: iran_news_pipeline
      - key: DB_HOST
        value: dpg-d6hl9v7gi27c73ftat10-a.oregon-postgres.render.com
      - key: DB_USER
        value: iran_news_pipeline_user
      - key: DB_PASSWORD
        sync: false
      - key: DB_PORT
        value: 5432
      - key: war_news_translation_api_key
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
      - key: GCS_BUCKET_NAME
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false