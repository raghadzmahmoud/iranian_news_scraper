services:
  - type: web
    name: iran-news-api
    env: python
    plan: standard
    buildCommand: pip install -r requirements.txt && python -m playwright install chromium && python -m playwright install-deps chromium
    startCommand: python app.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /ms-playwright
      - key: X_CHROME_PROFILE_DIR
        value: /tmp/playwright_profile

  - type: background_worker
    name: x-scraper-worker
    env: python
    plan: standard
    buildCommand: pip install -r requirements.txt && python -m playwright install chromium && python -m playwright install-deps chromium
    startCommand: python jobs/x_playwright_job.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /ms-playwright
      - key: X_CHROME_PROFILE_DIR
        value: /tmp/playwright_profile

  - type: background_worker
    name: translation-worker
    env: python
    plan: standard
    buildCommand: pip install -r requirements.txt
    startCommand: python jobs/translation_job.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7

  - type: background_worker
    name: audio-processing-worker
    env: python
    plan: standard
    buildCommand: pip install -r requirements.txt
    startCommand: python jobs/audio_processing_job.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
